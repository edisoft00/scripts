<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scripts</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      background: #0d1117;
      color: #c9d1d9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 720px;
      width: 100%;
    }

    .header-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 1.4rem;
      color: #58a6ff;
    }

    .github-link {
      color: #8b949e;
      transition: color 0.2s;
      display: flex;
    }

    .github-link:hover {
      color: #c9d1d9;
    }

    .status {
      font-size: 0.85rem;
      color: #8b949e;
      margin-bottom: 12px;
    }

    .code-box {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      white-space: pre;
      font-size: 0.8rem;
      line-height: 1.5;
      max-height: 60vh;
      overflow-y: auto;
      color: #c9d1d9;
    }

    .btn-copy {
      margin-top: 12px;
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #238636;
      color: #fff;
      transition: background 0.2s;
    }

    .btn-copy:hover { background: #2ea043; }
    .btn-copy:active { background: #196c2e; }

    .btn-copy.copied {
      background: #58a6ff;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-container">
      <h1>⚡ AntiRetry</h1>
      <a href="https://github.com/edisoft00/scripts" target="_blank" rel="noopener noreferrer" class="github-link" title="View Repo on GitHub">
        <svg height="24" viewBox="0 0 16 16" version="1.1" width="24" aria-hidden="true"><path fill-rule="evenodd" fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
      </a>
    </div>
    <p class="status" id="status">Loading script from remote...</p>
    <div class="code-box" id="codeBox">Loading...</div>
    <button class="btn-copy" id="copyBtn" disabled>Copy to Clipboard</button>
  </div>

  <script>
    const SCRIPT_URL = 'antiretry.js';
    const codeBox = document.getElementById('codeBox');
    const copyBtn = document.getElementById('copyBtn');
    const status = document.getElementById('status');

    // Fetch the script as plain text (never executed)
    fetch(SCRIPT_URL)
      .then(res => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.text();
      })
      .then(code => {
        codeBox.textContent = code;
        copyBtn.disabled = false;
        status.textContent = `Loaded from: ${SCRIPT_URL}`;
      })
      .catch(err => {
        codeBox.textContent = `Error loading script: ${err.message}`;
        status.textContent = 'Failed to load script.';
      });

    // Copy to clipboard on button click
    copyBtn.addEventListener('click', () => {
      let code = codeBox.textContent;
      
      // Minify: Remove comments
      code = code.replace(/\/\*[\s\S]*?\*\//g, '')
                 .replace(/([^:]|^)\/\/.*/g, '$1');

      // Temporarily replace strings to avoid messing with their content
      const strings = [];
      code = code.replace(/(["'`])(?:\\[\s\S]|(?!\1)[^\\])*\1/g, match => {
        strings.push(match);
        return `___STR${strings.length - 1}___`;
      });

      // Compress whitespace and remove spaces around punctuation
      code = code.replace(/\s+/g, ' ')
                 .replace(/\s*([{}[\]()=<>&|!?:;,+\-*\/~^%])\s*/g, '$1')
                 .replace(/___STR(\d+)___/g, (_, i) => strings[i])
                 .trim();

      navigator.clipboard.writeText(code).then(() => {
        copyBtn.textContent = '✅ Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = 'Copy to Clipboard';
          copyBtn.classList.remove('copied');
        }, 2000);
      });
    });
  </script>
</body>
</html>
